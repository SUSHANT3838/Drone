<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Rental - Contact</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <div class="logo"><h1>Drone <span>Fleet </span>Manegment</h1></div>
        <div class="menu-toggle" id="mobile-menu"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
        <nav class="nav-menu">
            <a href="index.html" class="nav-link">Home</a>
            <a href="Products.html" class="nav-link">Products</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="contact.html" class="nav-link active">Contact</a>
            <a href="cart.html" class="nav-link">Cart</a>
            <button class="btn-login">Login</button>
        </nav>
    </header>

    <section class="page-header contact-header">
        <h2>#Contact_Us</h2>
        <p>We are here to assist you with your drone rental needs!</p>
    </section>

    <section class="contact-details section-p1">
        <div class="details">
            <span>GET IN TOUCH</span>
            <h2>Contact us for inquiries or support</h2>
            <h3>Head Office</h3>
            <div>
                <li><i class="fas fa-map"></i> <p>New York, USA</p></li>
                <li><i class="far fa-envelope"></i> <p>support@dronerental.com</p></li>
                <li><i class="fas fa-phone-alt"></i> <p>+1 800 123 4567</p></li>
            </div>
        </div>
        
        <div class="form">
            <form onsubmit="submitForm(event)">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="E-mail" required>
                <input type="text" placeholder="Subject">
                <textarea cols="30" rows="10" placeholder="Your Message"></textarea>
                <button class="btn-primary">Submit</button>
            </form>
        </div>
    </section>

    <footer class="section-p1">
        <p>&copy; 2026 Drone Rental Service</p>
    </footer>
</body>
</html>
