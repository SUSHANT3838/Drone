<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Rental Service</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <h1>Drone <span>Fleet </span>Manegment</h1>
        </div>

        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>

        <nav class="nav-menu">
            <a href="home.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
            <a href="Products.html" class="nav-link"><i class="fas fa-box"></i> Drones</a>
            <a href="about.html" class="nav-link"><i class="fas fa-info-circle"></i> About</a>
            <a href="contact.html" class="nav-link"><i class="fas fa-envelope"></i> Contact</a>
            <a href="cart.html" class="nav-link">Cart</a>
            
            <div class="auth-buttons">
                <button class="btn-login">Login</button>
                <button class="btn-signup">Sign-up</button>
            </div>
        </nav>
    </header>

    <section id="home" class="hero">
        <div class="hero-content">
            <h2>Welcome to Drone Rental Service</h2>
            <p>Explore our fleet of high-quality drones available for rent.</p>
            <button class="btn-primary">Rent a Drone</button>
        </div>
    </section>

    <section id="products" class="products-section">
        <h2 class="section-title">Featured Drones</h2>
        
        <div class="product-container">
            <div class="product-card">
                <div class="card-image">
                    <img src="https://example.com/drone1.jpg" alt="Photography Drone">
                </div>
                <div class="card-details">
                    <h3>Photography Drone</h3>
                    <p class="price">₹1000/day</p>
                    <button class="add-to-cart" onclick="addToCart('Photography Drone', 1000)">Rent Now</button>
                </div>
            </div>

            <div class="product-card">
                <div class="card-image">
                    <img src="https://example.com/drone2.jpg" alt="Delivery Drone">
                </div>
                <div class="card-details">
                    <h3>Delivery Drone</h3>
                    <p class="price">₹1500/day</p>
                    <button class="add-to-cart" onclick="addToCart('Delivery Drone', 1500)">Rent Now</button>
                </div>
            </div>

            <div class="product-card">
                <div class="card-image">
                    <img src="https://example.com/drone3.jpg" alt="Surveillance Drone">
                </div>
                <div class="card-details">
                    <h3>Surveillance Drone</h3>
                    <p class="price">₹1200/day</p>
                    <button class="add-to-cart" onclick="addToCart('Surveillance Drone', 1200)">Rent Now</button>
                </div>
            </div>

            <div id="dynamic-products" class="product-container">
                <!-- Dynamic products fetched from API will be inserted here -->
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 - Drone Rental Service</p>
        <div class="socials">
            <!-- <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-linkedin"></i></a>
            <a href="#"><i class="fab fa-github"></i></a> -->
        </div>
    </footer>

    <script src="js/index.js"></script>

        // Check if the user is authenticated
        document.addEventListener('DOMContentLoaded', () => {
            const isAuthenticated = localStorage.getItem('isAuthenticated');

            if (!isAuthenticated) {
                // Redirect to login page if not authenticated
                window.location.href = '../Login-Sign-up/html/login.html';
            }
        });
    </script> -->
    <button onclick="checkout()" class="btn-primary" style="margin: 20px;">Checkout</button>
</body>
</html>
